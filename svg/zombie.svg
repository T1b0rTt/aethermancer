<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 52" width="40" height="52">
  <!-- Body -->
  <rect x="10" y="22" width="20" height="22" fill="#4a5a2a" rx="2"/>
  <!-- Torn shirt details -->
  <path d="M10 28 L6 32 L10 32" fill="#3a4a1a"/>
  <path d="M30 30 L34 34 L30 34" fill="#3a4a1a"/>
  <!-- Left arm (outstretched) -->
  <rect x="0" y="22" width="12" height="6" fill="#5a7030" rx="3" transform="rotate(-15, 6, 25)"/>
  <!-- Right arm (outstretched) -->
  <rect x="28" y="20" width="12" height="6" fill="#5a7030" rx="3" transform="rotate(15, 34, 23)"/>
  <!-- Legs -->
  <rect x="11" y="42" width="8" height="10" fill="#2a3a1a" rx="2"/>
  <rect x="21" y="42" width="8" height="10" fill="#2a3a1a" rx="2"/>
  <!-- Head -->
  <ellipse cx="20" cy="15" rx="10" ry="11" fill="#6a8a3a"/>
  <!-- Decay patches -->
  <circle cx="14" cy="13" r="3" fill="#4a6a20" opacity="0.7"/>
  <circle cx="24" cy="18" r="2" fill="#4a6a20" opacity="0.6"/>
  <!-- Dead white eyes -->
  <ellipse cx="16" cy="14" rx="3" ry="2.5" fill="white"/>
  <ellipse cx="24" cy="14" rx="3" ry="2.5" fill="white"/>
  <circle cx="16" cy="14.5" r="1" fill="#cccccc" opacity="0.5"/>
  <circle cx="24" cy="14.5" r="1" fill="#cccccc" opacity="0.5"/>
  <!-- X eyes for dead look -->
  <line x1="14" y1="12" x2="18" y2="16" stroke="#555" stroke-width="1" opacity="0.8"/>
  <line x1="18" y1="12" x2="14" y2="16" stroke="#555" stroke-width="1" opacity="0.8"/>
  <!-- Mouth (grimace) -->
  <path d="M15 20 Q20 18 25 20" stroke="#2a3a10" stroke-width="1.5" fill="none"/>
  <!-- Teeth -->
  <rect x="17" y="19" width="2" height="3" fill="#ddd" rx="0.5"/>
  <rect x="21" y="19" width="2" height="3" fill="#ddd" rx="0.5"/>
</svg>

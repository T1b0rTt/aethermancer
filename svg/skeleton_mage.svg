<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 52" width="40" height="52">
  <!-- Robe -->
  <path d="M10 26 Q7 52 5 52 L35 52 Q33 52 30 26 Z" fill="#2a1a3a"/>
  <path d="M16 30 L15 52" stroke="#3a2a4a" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M24 30 L24 52" stroke="#3a2a4a" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Torso/ribs visible through robe -->
  <line x1="16" y1="28" x2="24" y2="28" stroke="#555544" stroke-width="1" opacity="0.5"/>
  <line x1="15" y1="31" x2="25" y2="31" stroke="#555544" stroke-width="1" opacity="0.4"/>
  <!-- Left arm bone -->
  <line x1="10" y1="28" x2="2" y2="36" stroke="#ccccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm holding staff -->
  <line x1="30" y1="28" x2="38" y2="22" stroke="#ccccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Staff -->
  <line x1="38" y1="22" x2="36" y2="4" stroke="#5a3020" stroke-width="2" stroke-linecap="round"/>
  <!-- Staff orb — red -->
  <circle cx="36" cy="3" r="5.5" fill="#880000" opacity="0.25"/>
  <circle cx="36" cy="3" r="4"   fill="#cc0000" opacity="0.6"/>
  <circle cx="36" cy="3" r="2.5" fill="#ff4400"/>
  <circle cx="35" cy="2" r="1"   fill="#ffaa00"/>
  <!-- Skull -->
  <ellipse cx="20" cy="15" rx="9" ry="10" fill="#e8e0cc"/>
  <!-- Eye sockets -->
  <ellipse cx="16" cy="14" rx="3.5" ry="3" fill="#1a0000"/>
  <ellipse cx="24" cy="14" rx="3.5" ry="3" fill="#1a0000"/>
  <!-- Glowing red eyes -->
  <circle cx="16" cy="14" r="1.8" fill="#ff2200"/>
  <circle cx="24" cy="14" r="1.8" fill="#ff2200"/>
  <circle cx="16.5" cy="13.5" r="0.6" fill="#ffaa00"/>
  <circle cx="24.5" cy="13.5" r="0.6" fill="#ffaa00"/>
  <!-- Nasal cavity -->
  <path d="M18.5 18 L20 20 L21.5 18" stroke="#ccbbaa" stroke-width="0.8" fill="none"/>
  <!-- Jaw/teeth -->
  <rect x="14" y="21" width="12" height="3" fill="#d8d0bc" rx="1"/>
  <line x1="17" y1="21" x2="17" y2="24" stroke="#aaa098" stroke-width="1"/>
  <line x1="20" y1="21" x2="20" y2="24" stroke="#aaa098" stroke-width="1"/>
  <line x1="23" y1="21" x2="23" y2="24" stroke="#aaa098" stroke-width="1"/>
  <!-- Hood rim -->
  <path d="M11 12 Q20 8 29 12" stroke="#3a2a4a" stroke-width="3" fill="none"/>
</svg>

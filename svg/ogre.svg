<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 72" width="56" height="72">
  <!-- Legs -->
  <rect x="8" y="54" width="14" height="18" fill="#556633" rx="3"/>
  <rect x="34" y="54" width="14" height="18" fill="#556633" rx="3"/>
  <!-- Body (huge) -->
  <ellipse cx="28" cy="42" rx="22" ry="20" fill="#667744"/>
  <!-- Belly highlight -->
  <ellipse cx="28" cy="46" rx="12" ry="10" fill="#778855" opacity="0.5"/>
  <!-- Left arm raised -->
  <rect x="-2" y="28" width="16" height="10" fill="#667744" rx="5" transform="rotate(-30, 6, 33)"/>
  <!-- Right arm with club -->
  <rect x="42" y="20" width="14" height="10" fill="#667744" rx="5" transform="rotate(25, 49, 25)"/>
  <!-- Club -->
  <rect x="52" y="8" width="6" height="20" fill="#4a3020" rx="2" transform="rotate(25, 55, 18)"/>
  <ellipse cx="58" cy="10" rx="7" ry="6" fill="#3a2010" transform="rotate(25, 58, 10)"/>
  <!-- Head -->
  <ellipse cx="28" cy="20" rx="16" ry="15" fill="#778855"/>
  <!-- Brow ridge -->
  <path d="M12 16 Q28 12 44 16" stroke="#4a5a30" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Eyes - beady and angry -->
  <ellipse cx="20" cy="19" rx="4" ry="3" fill="#220000"/>
  <ellipse cx="36" cy="19" rx="4" ry="3" fill="#220000"/>
  <circle cx="20" cy="19" r="2" fill="#cc2200"/>
  <circle cx="36" cy="19" r="2" fill="#cc2200"/>
  <circle cx="20.6" cy="18.4" r="0.7" fill="white"/>
  <circle cx="36.6" cy="18.4" r="0.7" fill="white"/>
  <!-- Nose -->
  <ellipse cx="28" cy="24" rx="4" ry="3" fill="#667744"/>
  <circle cx="26" cy="24" r="1.5" fill="#4a5530"/>
  <circle cx="30" cy="24" r="1.5" fill="#4a5530"/>
  <!-- Mouth angry -->
  <path d="M18 30 Q28 26 38 30" stroke="#2a3010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tusks -->
  <polygon points="21,30 19,38 23,30" fill="#eeeecc"/>
  <polygon points="35,30 33,38 37,30" fill="#eeeecc"/>
  <!-- Scar -->
  <line x1="32" y1="14" x2="36" y2="22" stroke="#556633" stroke-width="1.5" opacity="0.8"/>
</svg>

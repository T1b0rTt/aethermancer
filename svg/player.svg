<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 64" width="48" height="64">
  <!-- Robe body -->
  <path d="M14 34 Q10 56 8 64 L40 64 Q38 56 34 34 Z" fill="#2a3aaa"/>
  <path d="M20 38 L18 64" stroke="#3a4abb" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M24 38 L24 64" stroke="#3a4abb" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M28 38 L30 64" stroke="#3a4abb" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Belt -->
  <rect x="14" y="34" width="20" height="3" fill="#7744aa" rx="1"/>
  <!-- Chest -->
  <rect x="16" y="28" width="16" height="8" fill="#2a3aaa" rx="2"/>
  <!-- Neck -->
  <rect x="20" y="25" width="8" height="5" fill="#f5c89a" rx="1"/>
  <!-- Head -->
  <ellipse cx="24" cy="19" rx="9" ry="10" fill="#f5c89a"/>
  <!-- Hat brim -->
  <ellipse cx="24" cy="10" rx="12" ry="2.5" fill="#1a0066"/>
  <!-- Hat cone -->
  <polygon points="24,0 14,11 34,11" fill="#22007a"/>
  <!-- Hat star -->
  <circle cx="24" cy="5" r="2" fill="#ffcc00" opacity="0.9"/>
  <!-- Eyes -->
  <ellipse cx="20" cy="20" rx="2.5" ry="2" fill="white"/>
  <ellipse cx="28" cy="20" rx="2.5" ry="2" fill="white"/>
  <circle cx="20.5" cy="20" r="1.3" fill="#0055ff"/>
  <circle cx="28.5" cy="20" r="1.3" fill="#0055ff"/>
  <circle cx="20.8" cy="19.7" r="0.5" fill="white"/>
  <circle cx="28.8" cy="19.7" r="0.5" fill="white"/>
  <!-- Smile -->
  <path d="M21 24 Q24 26.5 27 24" stroke="#c08878" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Staff arm -->
  <line x1="34" y1="32" x2="44" y2="10" stroke="#6b3a1f" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Staff orb glow -->
  <circle cx="44" cy="9" r="6" fill="#00ccff" opacity="0.2"/>
  <circle cx="44" cy="9" r="4" fill="#00ddff" opacity="0.5"/>
  <circle cx="44" cy="9" r="2.5" fill="#aaffff"/>
  <circle cx="43" cy="8" r="1" fill="white"/>
</svg>

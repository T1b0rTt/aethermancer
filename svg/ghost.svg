<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 52" width="40" height="52">
  <!-- Outer glow aura -->
  <ellipse cx="20" cy="22" rx="18" ry="20" fill="#aa44ff" opacity="0.12"/>
  <!-- Main body -->
  <path d="M4 22 Q4 4 20 2 Q36 4 36 22 L36 44 Q32 40 28 44 Q24 48 20 44 Q16 40 12 44 Q8 48 4 44 Z"
        fill="#cc88ff" opacity="0.82"/>
  <!-- Inner body lighter -->
  <path d="M8 22 Q8 8 20 7 Q32 8 32 22 L32 40 Q29 37 27 40 Q24 43 20 40 Q16 37 13 40 Q11 37 8 40 Z"
        fill="#ddb0ff" opacity="0.5"/>
  <!-- Highlight -->
  <ellipse cx="14" cy="12" rx="5" ry="3.5" fill="white" opacity="0.25" transform="rotate(-20,14,12)"/>
  <!-- Eyes — large glowing -->
  <ellipse cx="14" cy="22" rx="5.5" ry="6" fill="#220033"/>
  <ellipse cx="26" cy="22" rx="5.5" ry="6" fill="#220033"/>
  <ellipse cx="14" cy="22" rx="3.5" ry="4" fill="#dd44ff"/>
  <ellipse cx="26" cy="22" rx="3.5" ry="4" fill="#dd44ff"/>
  <ellipse cx="14" cy="22" rx="1.8" ry="2" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="26" cy="22" rx="1.8" ry="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="14.5" cy="21" r="0.7" fill="#eeddff"/>
  <circle cx="26.5" cy="21" r="0.7" fill="#eeddff"/>
  <!-- Wispy mouth -->
  <path d="M15 31 Q20 35 25 31" stroke="#550077" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Tail wisps -->
  <path d="M4 44 Q2 48 4 50 Q6 48 8 50" stroke="#cc88ff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M28 44 Q26 48 28 50 Q30 48 32 50" stroke="#cc88ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Phase indicator sparkles (subtle, always visible) -->
  <circle cx="32" cy="10" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="8"  cy="14" r="1"   fill="#ffffff" opacity="0.25"/>
</svg>
